repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.0
    hooks:
      - id: ruff
        args: [--fix]
        files: ^PaddleOCR/
      - id: ruff-format
        files: ^PaddleOCR/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        files: ^PaddleOCR/src/
        additional_dependencies:
          - pydantic==2.13.4
          - pydantic-settings==2.14.1

  - repo: https://github.com/awslabs/git-secrets
    rev: 1.3.0
    hooks:
      - id: git-secrets
