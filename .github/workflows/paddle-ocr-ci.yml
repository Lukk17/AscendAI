name: PaddleOCR CI

on:
  push:
    branches: [master]
    paths:
      - "PaddleOCR/**"
      - ".github/workflows/paddle-ocr-ci.yml"
  pull_request:
    branches: [master]
    paths:
      - "PaddleOCR/**"
      - ".github/workflows/paddle-ocr-ci.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: PaddleOCR

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ruff
        run: pip install ruff==0.13.0
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install runtime + mypy
        run: |
          pip install -e ".[dev]"
      - name: mypy
        run: mypy src

  test:
    name: Test + 100% branch coverage gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          pip install -e ".[dev]"
      - name: pytest
        run: pytest

  actionlint:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: actionlint
        uses: rhysd/actionlint@v1
