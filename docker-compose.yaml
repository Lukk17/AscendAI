name: ascend-ai

services:

  # ─── Document processing services ───

  docling-serve:
    image: quay.io/docling-project/docling-serve:v1.14.0
    container_name: docling-serve
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - DOCLING_SERVE_ENABLE_UI=1
      - DOCLING_SERVE_OCR_ENGINE=easyocr
    networks:
      default:
        aliases:
          - docling-serve

  unstructured-api:
    image: downloads.unstructured.io/unstructured-io/unstructured-api:0.0.90
    container_name: unstructured-api
    restart: unless-stopped
    ports:
      - "9080:8000"
    networks:
      default:
        aliases:
          - unstructured-api

  ascend-paddle-ocr:
    build:
      context: ./PaddleOCR
      dockerfile: Dockerfile
    container_name: ascend-paddle-ocr
    restart: unless-stopped
    ports:
      - "7022:7022"
    environment:
      - API_PORT=7022
      - API_HOST=0.0.0.0
      - LOG_LEVEL=INFO
      - DEFAULT_LANGUAGE=en
      - MAX_FILE_SIZE_MB=50
      - OCR_REQUEST_TIMEOUT=120
    networks:
      default:
        aliases:
          - ascend-paddle-ocr

  # ─── Search infrastructure ───

  searxng:
    image: searxng/searxng:2026.2.3-f7a608703
    container_name: searxng
    restart: unless-stopped
    ports:
      - "9020:8080"
    networks:
      default:
        aliases:
          - searxng

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:v3.4.6
    container_name: flaresolverr
    restart: unless-stopped
    ports:
      - "8191:8191"
    environment:
      - LOG_LEVEL=info
      - LOG_HTML=false
      - CAPTCHA_SOLVER=none
      - TZ=UTC
    networks:
      default:
        aliases:
          - flaresolverr

  # ─── Application services ───

  ascend-memory:
    build:
      context: ./AscendMemory
      dockerfile: Dockerfile
    container_name: ascend-memory
    restart: unless-stopped
    ports:
      - "7020:7020"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=http://host.docker.internal:1234/v1
      # - OPENAI_BASE_URL=https://api.openai.com/v1
      - API_PORT=7020
      - API_HOST=0.0.0.0
      # Qdrant must be running externally (port 6333)
      - QDRANT_HOST=host.docker.internal
      - QDRANT_PORT=6333
      - MEM0_EMBEDDING_MODEL=text-embedding-nomic-embed-text-v2-moe
#      - MEM0_EMBEDDING_MODEL=text-embedding-3-small
      - MEM0_COLLECTION_NAME=ascend_memory
      # - MEM0_COLLECTION_NAME=ascend_memory_cloud
      - MEM0_EMBEDDING_DIMS=768
      # - MEM0_EMBEDDING_DIMS=1536
      - MEM0_INFER_MEMORY=false
      # - MEM0_INFER_MEMORY=true
      - MEM0_DEFAULT_PROVIDER=lmstudio
      # - MEM0_DEFAULT_PROVIDER=openai
      - LOG_LEVEL=INFO
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      default:
        aliases:
          - ascend-memory

  ngrok-ascend-web-search:
    image: ngrok/ngrok:3
    container_name: ngrok-ascend-web-search
    restart: unless-stopped
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command: "http ascend-web-search:7900"
    depends_on:
      - ascend-web-search
    networks:
      default:
        aliases:
          - ngrok-ascend-web-search

  ascend-web-search:
    build:
      context: ./AscendWebSearch
      dockerfile: Dockerfile
    # image: lukk17/ascend-web-search:latest
    container_name: ascend-web-search
    restart: unless-stopped
    ports:
      - "7021:7021"
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080
      - API_PORT=7021
      - API_HOST=0.0.0.0
      - LOG_LEVEL=INFO
      - SEARXNG_LIMITER=false
      - SEARXNG_USER_AGENT=AscendWebSearch/1.0
      - SEARXNG_X_REAL_IP=0.0.0.0
      - SEARXNG_X_FORWARDED_FOR=0.0.0.0
      - BLOCKLIST_URL=https://secure.fanboy.co.nz/fanboy-annoyance.txt
      - VALIDATION_MIN_WORDS=10
      - FLARESOLVERR_URL=http://flaresolverr:8191/v1
      - PUBLIC_VNC_URL=http://ngrok-ascend-web-search:4040/api/tunnels
      # Redis must be running externally (port 6379)
      - REDIS_URL=redis://host.docker.internal:6379/0
      - NOVNC_TIMEOUT_SECONDS=600
    cap_add:
      - SYS_ADMIN
    shm_size: "2gb"
    depends_on:
      - searxng
      - flaresolverr
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7021/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      default:
        aliases:
          - ascend-web-search

  weather-mcp:
    build:
      context: ./WeatherMCP
      dockerfile: Dockerfile
    # image: lukk17/weather-mcp:latest
    container_name: weather-mcp
    restart: unless-stopped
    ports:
      - "9998:9998"
    networks:
      default:
        aliases:
          - weather-mcp

  audio-scribe:
    build:
      context: ./AudioScribe
      dockerfile: Dockerfile
    # image: lukk17/audio-scribe:latest
    container_name: audio-scribe
    restart: unless-stopped
    ports:
      - "7017:7017"
    environment:
      - HF_HOME=/hf-cache
      - HF_TOKEN=${HF_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - D:/Development/AI/hf-cache:/hf-cache
      - C:\Users\Lukk\Desktop:/audio
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      default:
        aliases:
          - audio-scribe
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7017/health"]
      interval: 30s
      timeout: 5s
      retries: 3
