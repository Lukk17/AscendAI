name: ascend-ai

include:
  - ascend-scrapper.docker-compose.yaml

services:

  # ─── Document processing services ───

  docling-serve:
    image: quay.io/docling-project/docling-serve:v1.14.0
    container_name: docling-serve
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - DOCLING_SERVE_ENABLE_UI=1
      - DOCLING_SERVE_OCR_ENGINE=easyocr
      # 4 uvicorn workers so the AscendAgent's parallel per-page dispatch
      # (DocumentRouter.dispatchPagesInParallel) gets real CPU parallelism, not
      # just async-IO concurrency on a single worker. Tune up for heavy PDF traffic.
      - UVICORN_WORKERS=4
    networks:
      default:
        aliases:
          - docling-serve

  unstructured-api:
    image: downloads.unstructured.io/unstructured-io/unstructured-api:0.0.90
    container_name: unstructured-api
    restart: unless-stopped
    ports:
      - "9080:8000"
    networks:
      default:
        aliases:
          - unstructured-api

  ascend-paddle-ocr:
    build:
      context: ./PaddleOCR
      dockerfile: Dockerfile
    container_name: ascend-paddle-ocr
    restart: unless-stopped
    ports:
      - "7022:7022"
    environment:
      - API_PORT=7022
      - API_HOST=0.0.0.0
      - LOG_LEVEL=INFO
      - DEFAULT_LANGUAGE=en
      - MAX_FILE_SIZE_MB=50
      - OCR_REQUEST_TIMEOUT=120
    networks:
      default:
        aliases:
          - ascend-paddle-ocr

  # ─── Application services ───

  ascend-memory:
    build:
      context: ./AscendMemory
      dockerfile: Dockerfile
    container_name: ascend-memory
    restart: unless-stopped
    ports:
      - "7020:7020"
    environment:
      - API_PORT=7020
      - API_HOST=0.0.0.0
      # Qdrant must be running externally (port 6333)
      - QDRANT_HOST=host.docker.internal
      - QDRANT_PORT=6333
      # Per-provider routing — each provider hits its own endpoint with its own key.
      - LMSTUDIO_BASE_URL=http://host.docker.internal:1234/v1
      - LMSTUDIO_API_KEY=sk_local
      - OPENAI_BASE_URL=https://api.openai.com/v1
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_BASE_URL=https://generativelanguage.googleapis.com/v1beta/openai/
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MEM0_INFER_MEMORY=false
      # - MEM0_INFER_MEMORY=true
      - MEM0_DEFAULT_PROVIDER=lmstudio
      # - MEM0_DEFAULT_PROVIDER=openai
      - LOG_LEVEL=INFO
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      default:
        aliases:
          - ascend-memory

  weather-mcp:
    build:
      context: ./WeatherMCP
      dockerfile: Dockerfile
    # image: lukk17/weather-mcp:latest
    container_name: weather-mcp
    restart: unless-stopped
    ports:
      - "9998:9998"
    networks:
      default:
        aliases:
          - weather-mcp

  audio-scribe:
    build:
      context: ./AudioScribe
      dockerfile: Dockerfile
    # image: lukk17/audio-scribe:latest
    container_name: audio-scribe
    restart: unless-stopped
    ports:
      - "7017:7017"
    environment:
      - HF_HOME=/hf-cache
      - HF_TOKEN=${HF_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - D:/Development/AI/hf-cache:/hf-cache
      - C:\Users\Lukk\Desktop:/audio
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      default:
        aliases:
          - audio-scribe
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7017/health"]
      interval: 30s
      timeout: 5s
      retries: 3
