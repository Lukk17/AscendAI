info:
  name: search
  type: http
  seq: 1

http:
  method: GET
  url: "{{protocol}}://{{baseUrl}}:7021/api/v1/web/search?query=AscendAI&limit=3"
  params:
    - name: query
      value: AscendAI
      type: query
    - name: limit
      value: "3"
      type: query
  auth: inherit

runtime:
  tests:
    - type: after-response
      code: |-
        test("Status code is 200", function () {
            expect(res.getStatus()).to.equal(200);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
