info:
  name: extract-example-com
  type: http
  seq: 5

http:
  method: POST
  url: "{{protocol}}://{{baseUrl}}:7021/api/v2/web/read"
  body:
    type: json
    data: |-
      {
        "url": "https://www.example.com/",
        "include_links": false,
        "heavy_mode": false
      }
  auth: inherit

runtime:
  tests:
    - type: after-response
      code: |-
        test("Status code is 200", function () {
            expect(res.getStatus()).to.equal(200);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
