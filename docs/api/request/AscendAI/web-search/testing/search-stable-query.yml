http:
  method: GET
  url: "{{protocol}}://{{baseUrl}}:7021/api/v1/web/search?query=OpenStreetMap&limit=3"
  params:
    - name: query
      value: OpenStreetMap
      type: query
    - name: limit
      value: "3"
