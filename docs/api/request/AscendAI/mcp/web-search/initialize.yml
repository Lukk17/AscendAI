info:
  name: initialize
  type: http
  seq: 1

http:
  method: POST
  url: "{{protocol}}://{{baseUrl}}:7021/mcp"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json, text/event-stream
  body:
    type: json
    data: |-
      {
        "jsonrpc": "2.0",
        "id": 1,
        "method": "initialize",
        "params": {
          "protocolVersion": "{{mcp_protocol_version}}",
          "capabilities": {},
          "clientInfo": { "name": "postman-client", "version": "0.1.0" }
        }
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: "// Automatically extract header and save to collection variable\r

        // pm.collectionVariables.set(\"mcp_session_id\", res.getHeader(\"MCP-Session-Id\"));\r

        \r

        test(\"Session ID is set\", function () {\r

        \    expect(bru.getCollectionVar(\"mcp_session_id\")).to.not.be.undefined;\r

        \    expect(bru.getCollectionVar(\"mcp_session_id\")).to.not.be.empty;\r

        });"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
