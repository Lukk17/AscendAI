info:
  name: mcp-ocr
  type: http
  seq: 6

http:
  method: POST
  url: "{{protocol}}://{{baseUrl}}:7022/mcp/"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json, text/event-stream
    - name: Mcp-Session-Id
      value: "{{mcp_session_id}}"
  body:
    type: json
    data: |-
      {
        "jsonrpc": "2.0",
        "id": 1,
        "method": "tools/call",
        "params": {
          "name": "ocr_process",
          "arguments": {
            "file_path": "/e2e-fixtures/argent-saga-chronicles-page1.png",
            "lang": "en"
          }
        }
      }
  auth: inherit

runtime:
  tests:
    - type: after-response
      code: |-
        test("Status code is 200", function () {
            expect(res.getStatus()).to.equal(200);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
