info:
  name: ocr-invalid-no-file
  type: http
  seq: 1

http:
  method: POST
  url: "{{protocol}}://{{baseUrl}}:7022/v1/ocr"
  headers:
    - name: accept
      value: application/json
  body:
    type: multipart-form
    data:
      - name: lang
        type: text
        value: en
  auth: inherit

runtime:
  tests:
    - type: after-response
      code: |-
        test("Status code is 422", function () {
            expect(res.getStatus()).to.equal(422);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
