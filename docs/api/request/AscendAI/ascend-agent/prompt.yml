info:
  name: prompt
  type: http
  seq: 2

http:
  method: POST
  url: "{{protocol}}://{{baseUrl}}:9917/api/v1/ai/prompt"
  headers:
    - name: X-User-Id
      value: frosty
  body:
    type: multipart-form
    data:
      - name: prompt
        type: text
        value: What is dog?
      - name: document
        type: file
        value: []
        disabled: true
      - name: "image "
        type: file
        value: []
        disabled: true
      - name: embeddingProvider
        type: text
        value: openai
        description: "Optional, default to env variable value, values: lmstudio, openai, gemini"
      - name: provider
        type: text
        value: minimax
      - name: model
        type: text
        value: MiniMax-M2.7
        description: "default: MiniMax-M2.5 values: MiniMax-M2.5-highspeed ; MiniMax-M2.1 ; MiniMax-M2 ; MiniMax-M1"
      - name: provider
        type: text
        value: anthropic
        description: "Optional, default is lmstudio, values: openai"
        disabled: true
      - name: model
        type: text
        value: claude-sonnet-4-6
        description: "default claude-sonnet-4-5, values: claude-sonnet-4-6 ; claude-opus-4-6 ; claude-haiku-4-5 ; claude-haiku-3-5"
        disabled: true
      - name: provider
        type: text
        value: openai
        disabled: true
      - name: model
        type: text
        value: gpt-5.1
        description: "default gpt-4o, values: gpt-5.4 ; gpt-5.1 ; gpt-5-mini ; gpt-4o-mini"
        disabled: true
      - name: provider
        type: text
        value: gemini
        disabled: true
      - name: model
        type: text
        value: gemini-2.5-flash
        description: "default: gemini-2.5-flash values: gemini-pro-latest ; gemini-2.5-pro ; gemini-2.5-flash"
        disabled: true
      - name: provider
        type: text
        value: lmstudio
        description: default provider
        disabled: true
      - name: model
        type: text
        value: meta-llama-3.1-8b-instruct
        description: default meta-llama-3.1-8b-instruct
        disabled: true
      - name: embeddingProvider
        type: text
        value: lmstudio
        disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

