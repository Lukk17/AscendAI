info:
  name: rag-ingestion-run
  type: http
  seq: 8

http:
  method: POST
  url: "{{protocol}}://{{baseUrl}}:9917/api/v1/ingestion/run?embeddingProvider=openai"
  headers:
    - name: X-User-Id
      value: frosty
  params:
    - name: prefix
      value: documents/
      type: query
      disabled: true
    - name: prefix
      value: markdown/
      type: query
      disabled: true
    - name: embeddingProvider
      value: lmstudio
      type: query
      disabled: true
    - name: embeddingProvider
      value: openai
      type: query
    - name: embeddingProvider
      value: gemini
      type: query
      disabled: true
  body:
    type: multipart-form

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
