info:
  name: compaction-fires-prompt
  type: http
  seq: 15

http:
  method: POST
  url: "{{protocol}}://{{baseUrl}}:9917/api/v1/ai/prompt"
  headers:
    - name: X-User-Id
      value: compaction-fires-test
  body:
    type: multipart-form
    data:
      - name: prompt
        type: text
        value: Briefly summarise everything I've told you about myself so far.
      - name: provider
        type: text
        value: anthropic
      - name: model
        type: text
        value: claude-sonnet-4-6
      - name: embeddingProvider
        type: text
        value: openai

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
