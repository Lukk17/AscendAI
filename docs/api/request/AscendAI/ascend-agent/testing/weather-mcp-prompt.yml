info:
  name: weather-mcp-prompt
  type: http
  seq: 6

http:
  method: POST
  url: "{{protocol}}://{{baseUrl}}:9917/api/v1/ai/prompt"
  headers:
    - name: X-User-Id
      value: frosty
  body:
    type: multipart-form
    data:
      - name: prompt
        type: text
        value: What is current weather in Warsaw ?
      - name: embeddingProvider
        type: text
        value: openai
        description: "Optional, default to env variable value, values: lmstudio, openai, gemini"
      - name: provider
        type: text
        value: minimax
      - name: model
        type: text
        value: MiniMax-M2.7
        description: "default: MiniMax-M2.5 values: MiniMax-M2.5-highspeed ; MiniMax-M2.1 ; MiniMax-M2 ; MiniMax-M1"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
