info:
  name: compaction-idempotency-prompt
  type: http
  seq: 16

http:
  method: POST
  url: "{{protocol}}://{{baseUrl}}:9917/api/v1/ai/prompt"
  headers:
    - name: X-User-Id
      value: compaction-idempotency-test
  body:
    type: multipart-form
    data:
      - name: prompt
        type: text
        value: One more thing — can you also tell me the name of my dog and where he was rescued from?
      - name: provider
        type: text
        value: anthropic
      - name: model
        type: text
        value: claude-sonnet-4-6
      - name: embeddingProvider
        type: text
        value: openai

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
