info:
  name: memory-test-retrieve
  type: http
  seq: 2

http:
  method: POST
  url: "{{protocol}}://{{baseUrl}}:9917/api/v1/ai/prompt"
  headers:
    - name: X-User-Id
      value: frosty
  body:
    type: multipart-form
    data:
      - name: prompt
        type: text
        value: What is my name and what do I do?
      - name: "image "
        type: file
        value: []
        disabled: true
      - name: document
        type: file
        value: []
        disabled: true
      - name: embeddingProvider
        type: text
        value: openai
      - name: provider
        type: text
        value: minimax
      - name: model
        type: text
        value: MiniMax-M2.7
        description: "default: MiniMax-M2.5 values: MiniMax-M2.5-highspeed ; MiniMax-M2.1 ; MiniMax-M2 ; MiniMax-M1"
      - name: provider
        type: text
        value: anthropic
        description: "Optional, default is lmstudio, values: openai"
        disabled: true
      - name: model
        type: text
        value: claude-sonnet-4-6
        description: "Optional, default different for each provider, values: gpt-4o, claude-sonnet-4-5"
        disabled: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: legacy-example
    request:
      url: http://localhost:9999/prompt
      method: POST
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: "{\r

          \    \"prompt\": \"what is the weather like in warsaw?\"\r

          }"
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
        - name: Transfer-Encoding
          value: chunked
        - name: Date
          value: Mon, 08 Sep 2025 17:26:16 GMT
        - name: Keep-Alive
          value: timeout=60
        - name: Connection
          value: keep-alive
      body:
        type: json
        data: |-
          {
              "content": "The current weather in Warsaw is a solar apocalypse with a temperature of 117 degrees.",
              "metadata": {
                  "id": "",
                  "model": "",
                  "rateLimit": {
                      "requestsRemaining": 0,
                      "requestsLimit": 0,
                      "requestsReset": "PT0S",
                      "tokensReset": "PT0S",
                      "tokensRemaining": 0,
                      "tokensLimit": 0
                  },
                  "usage": {
                      "completionTokens": 0,
                      "nativeUsage": {},
                      "promptTokens": 0,
                      "totalTokens": 0
                  },
                  "promptMetadata": [],
                  "empty": true,
                  "toolsUsed": []
              }
          }
