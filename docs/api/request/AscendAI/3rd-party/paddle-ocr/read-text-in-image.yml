info:
  name: read-text-in-image
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:7022/v1/ocr
  headers:
    - name: accept
      value: application/json
  body:
    type: multipart-form
    data:
      - name: files
        type: file
        value:
          - /C:/Users/Lukk/Desktop/test-image.pdf
      - name: lang
        type: text
        value: pl

runtime:
  tests:
    - type: after-response
      code: |-
        test("Status code is 200", function () {
            expect(res.getStatus()).to.equal(200);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
