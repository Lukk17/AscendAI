info:
  name: read-text-file
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:5001/v1/convert/file
  headers:
    - name: accept
      value: application/json
  body:
    type: multipart-form
    data:
      - name: files
        type: file
        value:
          - /C:/Users/Lukk/Desktop/test.pdf
        contentType: application/pdf
      - name: lang
        type: text
        value: pol
      - name: to_formats
        type: text
        value: json

runtime:
  tests:
    - type: after-response
      code: |-
        test("Status code is 200", function () {
            expect(res.getStatus()).to.equal(200);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
