info:
  name: insert-alpha
  type: http
  seq: 4

http:
  method: POST
  url: "{{protocol}}://{{baseUrl}}:7020/api/v1/memory/insert"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "user_id": "frostyMemoryWipeAlpha",
        "provider": "openai",
        "text": "My favourite city is Lisbon"
      }
  auth: inherit

runtime:
  tests:
    - type: after-response
      code: |-
        test("Status code is 200", function () {
            expect(res.getStatus()).to.equal(200);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
