info:
  name: search-memory
  type: http
  seq: 2

http:
  method: GET
  url: "{{protocol}}://{{baseUrl}}:7020/api/v1/memory/search?user_id={{userId}}&query=dark%20mode"
  params:
    - name: user_id
      value: "{{userId}}"
      type: query
    - name: query
      value: dark%20mode
      type: query

runtime:
  tests:
    - type: after-response
      code: |-
        test("Status code is 200", function () {
            expect(res.getStatus()).to.equal(200);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: success
    request:
      url: http://localhost:7020/api/v1/memory/search?user_id=testUser1&query=dark%20mode
      method: GET
      params:
        - name: user_id
          value: testUser1
          type: query
        - name: query
          value: dark%20mode
          type: query
