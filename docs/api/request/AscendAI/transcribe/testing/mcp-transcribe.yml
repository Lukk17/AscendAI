info:
  name: mcp-transcribe
  type: http
  seq: 5

http:
  method: POST
  url: "{{protocol}}://{{baseUrl}}:7017/mcp"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json, text/event-stream
    - name: Mcp-Session-Id
      value: "{{mcp_session_id}}"
    - name: MCP-Protocol-Version
      value: "{{mcp_protocol_version}}"
  body:
    type: json
    data: |-
      {
        "jsonrpc": "2.0",
        "id": 1,
        "method": "tools/call",
        "params": {
          "name": "transcribe_openai",
          "arguments": {
            "audio_uri": "file:///fixtures/meeting-clip.wav",
            "model": "whisper-1",
            "language": "en"
          }
        }
      }
  auth: inherit

runtime:
  tests:
    - type: after-response
      code: |-
        test("Status code is 200", function () {
            expect(res.getStatus()).to.equal(200);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
