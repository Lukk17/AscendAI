info:
  name: transcribe-invalid-no-file
  type: http
  seq: 1

http:
  method: POST
  url: "{{protocol}}://{{baseUrl}}:7017/api/v1/transcribe/openai"
  headers:
    - name: accept
      value: application/json
  body:
    type: multipart-form
    data:
      - name: model
        type: text
        value: whisper-1
      - name: language
        type: text
        value: en
      - name: stream
        type: text
        value: "false"
  auth: inherit

runtime:
  tests:
    - type: after-response
      code: |-
        test("Status code is 422", function () {
            expect(res.getStatus()).to.equal(422);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
